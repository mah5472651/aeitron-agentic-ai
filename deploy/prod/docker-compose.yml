services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      MYTHOS_AUTH_ENABLED: "1"
      MYTHOS_QUOTA_ENABLED: "1"
      MYTHOS_JWT_SECRET: "${MYTHOS_JWT_SECRET:?set MYTHOS_JWT_SECRET}"
      MYTHOS_ALLOW_TOKEN_ISSUE: "0"
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mythos
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: mythos
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
