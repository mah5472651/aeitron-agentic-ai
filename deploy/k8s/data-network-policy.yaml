apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aeitron-data-platform-network
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - aeitron-data-worker
          - aeitron-postgres
          - aeitron-minio
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: aeitron-data-worker
        - podSelector:
            matchLabels:
              app: aeitron-api
        - podSelector:
            matchLabels:
              app: aeitron-minio
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: aeitron-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: aeitron-minio
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443

