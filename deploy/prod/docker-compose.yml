services:
  migrator:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["python", "-m", "src.aeitron.db.migration_runner"]
    environment:
      AEITRON_DATABASE_URL: "postgresql://aeitron:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aeitron"
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      AEITRON_ENV: "production"
      AEITRON_AUTH_ENABLED: "1"
      AEITRON_QUOTA_ENABLED: "1"
      AEITRON_JWT_SECRET: "${AEITRON_JWT_SECRET:?set AEITRON_JWT_SECRET}"
      AEITRON_WORKSPACE_BOOTSTRAP_TOKEN: "${AEITRON_WORKSPACE_BOOTSTRAP_TOKEN:?set AEITRON_WORKSPACE_BOOTSTRAP_TOKEN}"
      AEITRON_ALLOW_TOKEN_ISSUE: "0"
      AEITRON_DATABASE_URL: "postgresql://aeitron:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aeitron"
      AEITRON_REDIS_URL: "redis://redis:6379/0"
      AEITRON_QDRANT_URL: "http://qdrant:6333"
      AEITRON_EMBEDDING_URL: "${AEITRON_EMBEDDING_URL:?set AEITRON_EMBEDDING_URL}"
      AEITRON_OBJECT_STORE_URI: "s3://aeitron-datasets/training-workspace"
      AEITRON_OBJECT_STORE_ENDPOINT_URL: "http://minio:9000"
      AEITRON_OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      AWS_EC2_METADATA_DISABLED: "true"
      AEITRON_TRAINING_GIT_COMMIT: "${AEITRON_TRAINING_GIT_COMMIT:?set AEITRON_TRAINING_GIT_COMMIT}"
      AEITRON_TRAINING_IMAGE_DIGEST: "${AEITRON_TRAINING_IMAGE_DIGEST:?set AEITRON_TRAINING_IMAGE_DIGEST}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      default:
        aliases: ["aeitron-api"]
  training-workspace-ui:
    build:
      context: ../..
      dockerfile: apps/training-workspace/Dockerfile
    profiles: ["training"]
    restart: unless-stopped
    ports:
      - "8088:8080"
    depends_on:
      api:
        condition: service_healthy
  training-controller:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["training"]
    command: ["python", "-u", "-m", "src.aeitron.training_workspace", "controller", "--poll-seconds", "5"]
    restart: unless-stopped
    environment:
      AEITRON_ENV: "production"
      AEITRON_JWT_SECRET: "${AEITRON_JWT_SECRET:?set AEITRON_JWT_SECRET}"
      AEITRON_DATABASE_URL: "postgresql://aeitron:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aeitron"
      AEITRON_REDIS_URL: "redis://redis:6379/0"
      AEITRON_OBJECT_STORE_URI: "s3://aeitron-datasets/training-workspace"
      AEITRON_OBJECT_STORE_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      AWS_EC2_METADATA_DISABLED: "true"
      AEITRON_TRAINING_GIT_COMMIT: "${AEITRON_TRAINING_GIT_COMMIT:?set AEITRON_TRAINING_GIT_COMMIT}"
      AEITRON_TRAINING_IMAGE_DIGEST: "${AEITRON_TRAINING_IMAGE_DIGEST:?set AEITRON_TRAINING_IMAGE_DIGEST}"
    volumes:
      - training-runtime:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
  crawler-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["data"]
    command: ["python", "-m", "src.aeitron.learning.worker"]
    environment:
      AEITRON_DATABASE_URL: "postgresql://aeitron:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aeitron"
      AEITRON_DATA_SOURCES: "config/data_sources.ultimate.json"
      AEITRON_RAW_OUTPUT_DIR: "/data/raw"
      AEITRON_CLEAN_OUTPUT_DIR: "/data/clean"
      AEITRON_ASYNC_WORKERS: "32"
      AEITRON_BATCH_DOCS: "10000"
      AEITRON_WORKER_LOOPS: "100"
    volumes:
      - data-artifacts:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
  crawler-supervisor:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["data"]
    command: ["python", "-m", "src.aeitron.learning.supervisor"]
    environment:
      AEITRON_DATABASE_URL: "postgresql://aeitron:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aeitron"
      AEITRON_DATA_SOURCES: "config/data_sources.ultimate.json"
      AEITRON_RAW_OUTPUT_DIR: "/data/raw"
      AEITRON_CLEAN_OUTPUT_DIR: "/data/clean"
      AEITRON_OBJECT_STORE_URI: "s3://aeitron-datasets/pretraining"
      AEITRON_ASYNC_WORKERS: "32"
      AEITRON_WORKER_REPLICAS: "4"
      AEITRON_BATCH_DOCS: "10000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - data-artifacts:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/aeitron.json:ro
    depends_on:
      - prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    profiles: ["monitoring"]
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4318:4318"
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aeitron
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: aeitron
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeitron -d aeitron"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["data", "training"]
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until mc alias set aeitron http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
        mc mb --ignore-existing aeitron/aeitron-datasets
        mc anonymous set none aeitron/aeitron-datasets
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  data-artifacts:
  prometheus-data:
  grafana-data:
  qdrant-data:
  training-runtime:

