<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mythos AI Core</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <aside class="rail">
      <div class="brand">
        <img class="brand-logo" src="/brand/logo?source=user-logo" alt="AI logo">
        <div>
          <h1>Mythos Core</h1>
          <p id="runtimeLabel">local</p>
        </div>
      </div>

      <div class="control-group">
        <label for="workspace">Workspace</label>
        <input id="workspace" autocomplete="off">
      </div>

      <div class="segmented" aria-label="Mode">
        <button class="segment active" data-mode="chat" type="button">Chat</button>
        <button class="segment" data-mode="agent" type="button">Agent</button>
        <button class="segment" data-mode="security" type="button">Security</button>
        <button class="segment" data-mode="quality" type="button">Quality</button>
      </div>

      <dl class="status-grid">
        <div>
          <dt>Backend</dt>
          <dd id="backendValue">mock</dd>
        </div>
        <div>
          <dt>Model</dt>
          <dd id="modelValue">phase11</dd>
        </div>
        <div>
          <dt>Score</dt>
          <dd id="scoreValue">ready</dd>
        </div>
      </dl>
    </aside>

    <section class="workbench">
      <header class="topbar">
        <div>
          <span class="eyebrow" id="modeLabel">Chat</span>
          <h2 id="viewTitle">Agentic Coding Console</h2>
        </div>
        <button id="clearButton" class="icon-button" type="button" title="Clear conversation">Clear</button>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="composer" class="composer">
        <textarea id="prompt" placeholder="Build a secure API, debug an error, or review this repo"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
