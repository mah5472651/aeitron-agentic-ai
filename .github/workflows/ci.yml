name: aeitron-ci

permissions:
  contents: read

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local-dev.txt
          pip install --upgrade bandit semgrep pip-audit
          pip install -e . --no-deps
      - name: Client package smoke
        run: |
          aeitron --help
          python -c "from aeitron_client import Workspace; assert Workspace.__name__ == 'Workspace'"
      - name: Compile
        run: python -m compileall -q src/aeitron tests
      - name: Release gate
        run: python -m src.aeitron.evaluation.release_gate
      - name: Production hardening gates
        run: |
          python -m src.aeitron.deployment.k8s_validate --output-dir artifacts/aeitron/ci-k8s-validation
          python -m src.aeitron.learning.storage --uri local://artifacts/aeitron/ci-object-store --work-dir artifacts/aeitron/ci-storage-lifecycle
          mkdir -p artifacts/aeitron/ci-dataset
          cat > artifacts/aeitron/ci-dataset/clean.jsonl <<'JSONL'
          {"text":"General architecture documentation for Aeitron production systems.","license":"mit","category":"general","quality":{"labels":["documentation"]}}
          {"text":"def secure_query(cursor, value): return cursor.execute('select * from users where id=?', [value])","license":"apache-2.0","category":"code","quality":{"labels":["code"]}}
          {"text":"Defensive security guidance: prevent SQL injection with parameterized queries and regression tests.","license":"cc-by-4.0","category":"cybersecurity","quality":{"labels":["defensive_security"]}}
          JSONL
          python -m src.aeitron.learning.dataset_validation --inputs artifacts/aeitron/ci-dataset/clean.jsonl --output-dir artifacts/aeitron/ci-dataset-validation --min-records 3 --min-avg-chars 20
          python -m src.aeitron.security.audit --strict-external-tools --no-codeql --output-dir artifacts/aeitron/ci-security-audit
      - name: Data platform readiness contract
        run: |
          python -m src.aeitron.learning.production_check \
            --sources config/data_sources.ultimate.json \
            --frontier-backend postgres \
            --postgres-dsn postgresql://user:pass@postgres:5432/aeitron \
            --object-store-uri s3://aeitron-datasets/pretraining \
            --production \
            --worker-replicas 4 \
            --async-workers 32
          python -m src.aeitron.learning.capacity --target-documents 1000000 --worker-replicas 4 --async-workers-per-replica 16
          python -m src.aeitron.learning.run_plan \
            --sources config/data_sources.ultimate.json \
            --output-dir artifacts/aeitron/ci-data-run \
            --target-documents 1000 \
            --target-days 1 \
            --postgres-dsn postgresql://user:pass@postgres:5432/aeitron \
            --object-store-uri s3://aeitron-datasets/pretraining \
            --worker-replicas 4 \
            --async-workers 32
          python -m src.aeitron.learning.source_registry --sources config/data_sources.ultimate.json
          python -m src.aeitron.learning.governance --store artifacts/aeitron/ci-governance report
      - name: Scratch CPU smoke
        run: python -m src.aeitron.model_ops.gpu_smoke --device cpu --steps 1 --sequence-length 16 --batch-size 1 --dtype fp32

  workspace-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/training-workspace/package-lock.json
      - name: Install locked dependencies
        working-directory: apps/training-workspace
        run: npm ci
      - name: Production build
        working-directory: apps/training-workspace
        run: npm run build

  codeql:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

