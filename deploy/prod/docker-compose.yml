services:
  migrator:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["python", "-m", "src.mythos.db.migration_runner"]
    environment:
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      MYTHOS_AUTH_ENABLED: "1"
      MYTHOS_QUOTA_ENABLED: "1"
      MYTHOS_JWT_SECRET: "${MYTHOS_JWT_SECRET:?set MYTHOS_JWT_SECRET}"
      MYTHOS_ALLOW_TOKEN_ISSUE: "0"
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  crawler-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["data"]
    command: ["python", "-m", "src.mythos.learning.worker"]
    environment:
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_DATA_SOURCES: "config/data_sources.ultimate.json"
      MYTHOS_RAW_OUTPUT_DIR: "/data/raw"
      MYTHOS_CLEAN_OUTPUT_DIR: "/data/clean"
      MYTHOS_ASYNC_WORKERS: "32"
      MYTHOS_BATCH_DOCS: "10000"
      MYTHOS_WORKER_LOOPS: "100"
    volumes:
      - data-artifacts:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
  crawler-supervisor:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["data"]
    command: ["python", "-m", "src.mythos.learning.supervisor"]
    environment:
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_DATA_SOURCES: "config/data_sources.ultimate.json"
      MYTHOS_RAW_OUTPUT_DIR: "/data/raw"
      MYTHOS_CLEAN_OUTPUT_DIR: "/data/clean"
      MYTHOS_OBJECT_STORE_URI: "s3://mythos-datasets/pretraining"
      MYTHOS_ASYNC_WORKERS: "32"
      MYTHOS_WORKER_REPLICAS: "4"
      MYTHOS_BATCH_DOCS: "10000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      AWS_EC2_METADATA_DISABLED: "true"
    volumes:
      - data-artifacts:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/mythos.json:ro
    depends_on:
      - prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    profiles: ["monitoring"]
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4318:4318"
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mythos
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: mythos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mythos -d mythos"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["data"]
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until mc alias set mythos http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
        mc mb --ignore-existing mythos/mythos-datasets
        mc anonymous set none mythos/mythos-datasets
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  data-artifacts:
  prometheus-data:
  grafana-data:
