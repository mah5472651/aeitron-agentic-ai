apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aeitron-minio
spec:
  serviceName: aeitron-minio
  replicas: 1
  selector:
    matchLabels:
      app: aeitron-minio
  template:
    metadata:
      labels:
        app: aeitron-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-password
          ports:
            - containerPort: 9000
            - containerPort: 9001
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: minio-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Ti
---
apiVersion: v1
kind: Service
metadata:
  name: aeitron-minio
spec:
  selector:
    app: aeitron-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: aeitron-minio-bootstrap
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-04-16T18-13-26Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-password
          command:
            - /bin/sh
            - -lc
            - |
              mc alias set aeitron http://aeitron-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing aeitron/aeitron-datasets
              mc anonymous set none aeitron/aeitron-datasets
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi

