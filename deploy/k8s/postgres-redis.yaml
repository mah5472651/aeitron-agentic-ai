apiVersion: apps/v1
kind: Deployment
metadata:
  name: mythos-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mythos-postgres
  template:
    metadata:
      labels:
        app: mythos-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: mythos
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: mythos
---
apiVersion: v1
kind: Service
metadata:
  name: mythos-postgres
spec:
  selector:
    app: mythos-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mythos-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mythos-redis
  template:
    metadata:
      labels:
        app: mythos-redis
    spec:
      containers:
        - name: redis
          image: redis:7
---
apiVersion: v1
kind: Service
metadata:
  name: mythos-redis
spec:
  selector:
    app: mythos-redis
  ports:
    - port: 6379
      targetPort: 6379
