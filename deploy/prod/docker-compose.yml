services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      MYTHOS_AUTH_ENABLED: "1"
      MYTHOS_QUOTA_ENABLED: "1"
      MYTHOS_JWT_SECRET: "${MYTHOS_JWT_SECRET:?set MYTHOS_JWT_SECRET}"
      MYTHOS_ALLOW_TOKEN_ISSUE: "0"
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - postgres
      - redis
  crawler-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["data"]
    command: ["python", "-m", "src.mythos.learning.worker"]
    environment:
      MYTHOS_DATABASE_URL: "postgresql://mythos:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/mythos"
      MYTHOS_DATA_SOURCES: "config/data_sources.production.sample.json"
      MYTHOS_RAW_OUTPUT_DIR: "/data/raw"
      MYTHOS_CLEAN_OUTPUT_DIR: "/data/clean"
      MYTHOS_ASYNC_WORKERS: "32"
      MYTHOS_BATCH_DOCS: "10000"
      MYTHOS_WORKER_LOOPS: "100"
    volumes:
      - data-artifacts:/data
    depends_on:
      - postgres
      - minio
      - minio-bootstrap
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mythos
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: mythos
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["data"]
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until mc alias set mythos http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
        mc mb --ignore-existing mythos/mythos-datasets
        mc anonymous set none mythos/mythos-datasets
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  data-artifacts:
