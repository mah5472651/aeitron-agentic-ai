server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;

  location /v1/ {
    proxy_pass http://aeitron-api:8090;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 1d;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Authorization $http_authorization;
  }

  location /health/ {
    proxy_pass http://aeitron-api:8090;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
