apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aeitron-dcgm-exporter
  namespace: aeitron-training
  labels:
    app: aeitron-dcgm-exporter
spec:
  selector:
    matchLabels:
      app: aeitron-dcgm-exporter
  template:
    metadata:
      labels:
        app: aeitron-dcgm-exporter
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9400
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: pod-gpu-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
      volumes:
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: aeitron-dcgm-exporter
  namespace: aeitron-training
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9400"
    prometheus.io/path: "/metrics"
  labels:
    app: aeitron-dcgm-exporter
spec:
  clusterIP: None
  selector:
    app: aeitron-dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
