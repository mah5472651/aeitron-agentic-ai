apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aeitron-postgres
spec:
  serviceName: aeitron-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aeitron-postgres
  template:
    metadata:
      labels:
        app: aeitron-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: aeitron
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: aeitron
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 500Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aeitron-postgres
spec:
  selector:
    app: aeitron-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeitron-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aeitron-redis
  template:
    metadata:
      labels:
        app: aeitron-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aeitron-redis
spec:
  selector:
    app: aeitron-redis
  ports:
    - port: 6379
      targetPort: 6379

