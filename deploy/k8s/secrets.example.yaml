apiVersion: v1
kind: Secret
metadata:
  name: aeitron-secrets
type: Opaque
stringData:
  jwt-secret: "replace-with-64-plus-random-chars"
  workspace-bootstrap-token: "replace-with-48-plus-random-characters"
  postgres-password: "replace-with-postgres-password"
  redis-password: "replace-with-redis-password"
  redis-url: "redis://:replace-with-redis-password@aeitron-redis:6379/0"
  database-url: "postgresql://aeitron:replace-with-postgres-password@aeitron-postgres:5432/aeitron"
  minio-root-user: "replace-with-minio-access-key"
  minio-root-password: "replace-with-minio-secret-key"
  nvd-api-key: "optional-nvd-api-key"
  github-token: "optional-github-token-for-advisory-api"

