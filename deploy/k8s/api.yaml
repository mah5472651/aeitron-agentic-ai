apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeitron-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aeitron-api
  template:
    metadata:
      labels:
        app: aeitron-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: aeitron-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: AEITRON_ENV
              value: production
            - name: AEITRON_AUTH_ENABLED
              value: "1"
            - name: AEITRON_QUOTA_ENABLED
              value: "1"
            - name: AEITRON_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: jwt-secret
            - name: AEITRON_WORKSPACE_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: workspace-bootstrap-token
            - name: AEITRON_ALLOW_TOKEN_ISSUE
              value: "0"
            - name: AEITRON_PROJECT_ROOTS
              value: /workspace/projects
            - name: AEITRON_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: database-url
            - name: AEITRON_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: redis-url
            - name: AEITRON_QDRANT_URL
              value: http://aeitron-qdrant:6333
            - name: AEITRON_EMBEDDING_URL
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: embedding-url
            - name: AEITRON_OBJECT_STORE_URI
              value: s3://aeitron-datasets/training-workspace
            - name: AEITRON_OBJECT_STORE_ENDPOINT_URL
              value: http://aeitron-minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aeitron-secrets
                  key: minio-root-password
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: AEITRON_TRAINING_GIT_COMMIT
              valueFrom:
                configMapKeyRef:
                  name: aeitron-training-build
                  key: git-commit
            - name: AEITRON_TRAINING_IMAGE_DIGEST
              valueFrom:
                configMapKeyRef:
                  name: aeitron-training-build
                  key: image-digest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime
              mountPath: /app/artifacts
            - name: tmp
              mountPath: /tmp
            - name: project-workspaces
              mountPath: /workspace/projects
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: runtime
          emptyDir:
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: project-workspaces
          persistentVolumeClaim:
            claimName: aeitron-project-workspaces
---
apiVersion: v1
kind: Service
metadata:
  name: aeitron-api
spec:
  selector:
    app: aeitron-api
  ports:
    - port: 80
      targetPort: 8090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aeitron-training-build
data:
  git-commit: "replace-with-immutable-git-commit"
  image-digest: "replace-with-sha256-image-digest"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aeitron-project-workspaces
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: aeitron-workspaces
  resources:
    requests:
      storage: 1Ti

