services:
  vllm:
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/security-coder-awq
      SERVED_MODEL_NAME: security-coder
      VLLM_HOST: "0.0.0.0"
      TP_SIZE: "2"
      MAX_NUM_SEQS: "256"
      MAX_NUM_BATCHED_TOKENS: "8192"
      GPU_MEMORY_UTILIZATION: "0.94"
      QUANTIZATION: awq
      MAX_MODEL_LEN: "8192"
    command:
      - python
      - /workspace/src/phase8/vllm_server.py
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ../../:/workspace:ro
      - ../../models:/models:ro
      - ~/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  gateway:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install fastapi uvicorn httpx pydantic &&
             python src/phase8/gateway.py --host 0.0.0.0 --port 8080"
    volumes:
      - ../../:/workspace:ro
    environment:
      VLLM_BASE_URL: http://vllm:8000
      SERVED_MODEL_NAME: security-coder
      GATEWAY_WORKERS: "8"
      MAX_QUEUE_SIZE: "2048"
    ports:
      - "8080:8080"
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
