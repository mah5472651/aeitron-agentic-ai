apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeitron-data-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeitron-data-worker
  minReplicas: 4
  maxReplicas: 64
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

