apiVersion: v1
kind: Secret
metadata:
  name: aeitron-training-secrets
  namespace: aeitron-training
type: Opaque
stringData:
  jwt-secret: "replace-with-64-plus-random-chars"
  database-url: "postgresql://aeitron:replace-with-password@aeitron-postgres.default.svc.cluster.local:5432/aeitron"
  redis-url: "redis://:replace-with-redis-password@aeitron-redis.default.svc.cluster.local:6379/0"
  object-store-endpoint: "http://aeitron-minio.default.svc.cluster.local:9000"
  object-store-access-key: "replace-with-minio-access-key"
  object-store-secret-key: "replace-with-minio-secret-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: aeitron-training-runtime
  namespace: aeitron-training
type: Opaque
stringData:
  AEITRON_DATABASE_URL: "postgresql://aeitron:replace-with-password@aeitron-postgres.default.svc.cluster.local:5432/aeitron"
  AEITRON_REDIS_URL: "redis://:replace-with-redis-password@aeitron-redis.default.svc.cluster.local:6379/0"
  AEITRON_OBJECT_STORE_URI: "s3://aeitron-datasets/training-workspace"
  AEITRON_OBJECT_STORE_ENDPOINT_URL: "http://aeitron-minio.default.svc.cluster.local:9000"
  AWS_ACCESS_KEY_ID: "replace-with-workload-scoped-access-key"
  AWS_SECRET_ACCESS_KEY: "replace-with-workload-scoped-secret-key"
  AWS_EC2_METADATA_DISABLED: "true"
