apiVersion: apps/v1
kind: Deployment
metadata:
  name: mythos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mythos-api
  template:
    metadata:
      labels:
        app: mythos-api
    spec:
      containers:
        - name: api
          image: mythos-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: MYTHOS_AUTH_ENABLED
              value: "1"
            - name: MYTHOS_QUOTA_ENABLED
              value: "1"
            - name: MYTHOS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: jwt-secret
            - name: MYTHOS_ALLOW_TOKEN_ISSUE
              value: "0"
            - name: MYTHOS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: database-url
            - name: MYTHOS_REDIS_URL
              value: redis://mythos-redis:6379/0
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mythos-api
spec:
  selector:
    app: mythos-api
  ports:
    - port: 80
      targetPort: 8090
