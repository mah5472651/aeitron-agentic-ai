apiVersion: batch/v1
kind: Job
metadata:
  name: mythos-data-pipeline
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pipeline
          image: mythos-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - src.mythos.learning.data_pipeline
          args:
            - --sources
            - config/data_sources.production.sample.json
            - --dataset-id
            - mythos-defensive-coding-corpus
            - --work-dir
            - /data/pipeline
            - --frontier-backend
            - postgres
            - --postgres-dsn
            - "$(MYTHOS_DATABASE_URL)"
            - --object-store-uri
            - s3://mythos-datasets/pretraining
            - --object-store-endpoint-url
            - http://mythos-minio:9000
            - --max-docs
            - "1000000"
            - --workers
            - "64"
            - --max-depth
            - "2"
            - --vocab-size
            - "64000"
            - --sequence-length
            - "2048"
            - --shard-token-count
            - "1000000"
            - --skip-train
          env:
            - name: MYTHOS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: database-url
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: minio-root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mythos-secrets
                  key: minio-root-password
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
          volumeMounts:
            - name: data-artifacts
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "16"
              memory: 64Gi
      volumes:
        - name: data-artifacts
          persistentVolumeClaim:
            claimName: mythos-data-artifacts
